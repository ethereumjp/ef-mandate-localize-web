name: Deploy web to IPFS

# Builds the reading site (apps/web) in CI — with the widget bundled in
# (embed:build copies @anno/widget dist into public/annotation/, and the page
# falls back to the same-origin annotation/embed.js when PUBLIC_ANNO_WIDGET_URL
# is unset) — and deploys apps/web/dist to its OWN 4everland Hosting project.
#
# The site is deliberately self-contained: it works on any IPFS gateway (incl.
# Service-Worker gateways like inbrowser.link) with no external delivery
# dependency. Third parties embed the widget via jsDelivr/IPNS instead (see
# deploy-widget.yml). Do NOT set PUBLIC_ANNO_WIDGET_URL for this deploy —
# public IPFS gateway hotlinking is being sunset in 2026, and any external URL
# reintroduces a delivery dependency the site doesn't need.
#
# NOTE: cli-api.4everland.org is the API the official @4everland/hosting-cli uses
# under the hood — stable in practice but not a published/contracted API.
#
# Config (Settings → Environments → "production", + Secrets and variables → Actions):
#   secret   FOUR_EVERLAND_TOKEN           Hosting → Auth Token → +Create
#   variable FOUR_EVERLAND_PROJECT_ID      id of the (only) Hosting project — the site
#   variable FOUR_EVERLAND_DEPLOY_URL      (optional) live URL → skip-if-unchanged
#
# Create the project via the API (NOT GitHub integration, so 4everland does NOT build):
#   curl -H "token: $TOKEN" -F name=ef-mandate-localize-web -F platform=IPFS \
#        https://cli-api.4everland.org/project

on:
  workflow_dispatch: {}
  push:
    branches: [main]
    paths:
      - "apps/web/**"
      - "packages/core/**"
      - "packages/widget/**" # widget is bundled into the site
      - "localize" # submodule pointer bumps (content)
      - "pnpm-lock.yaml"
      - ".github/workflows/deploy-web.yml"

concurrency:
  group: deploy-web-4everland
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 15
    steps:
      - name: Check out repository (with submodules)
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Set up pnpm
        uses: pnpm/action-setup@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build site (widget bundled, served same-origin)
        run: pnpm --filter ef-mandate-localize-web build

      - name: Require bundled widget
        run: |
          if [ ! -f apps/web/dist/annotation/embed.js ]; then
            echo "::error::annotation/embed.js missing from dist — site would ship without the widget. Deploy blocked."
            exit 1
          fi

      - name: Build id + skip-if-unchanged
        id: gate
        env:
          DEPLOY_URL: ${{ vars.FOUR_EVERLAND_DEPLOY_URL }}
        run: |
          new=$(cd apps/web/dist && find . -type f -exec sha256sum {} \; | LC_ALL=C sort | sha256sum | cut -d' ' -f1)
          echo "web build id: $new"
          cur=""
          if [ -n "$DEPLOY_URL" ]; then
            cur=$(curl -fsS --max-time 20 "${DEPLOY_URL%/}/.build-id" 2>/dev/null || echo "")
          fi
          if [ -n "$cur" ] && [ "$new" = "$cur" ]; then
            echo "deploy=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Web build unchanged ($new) — skipping deploy."
          else
            echo "deploy=true" >> "$GITHUB_OUTPUT"
          fi
          echo "$new" > apps/web/dist/.build-id

      - name: Zip dist
        if: steps.gate.outputs.deploy == 'true'
        run: cd apps/web/dist && zip -qr "$GITHUB_WORKSPACE/web.zip" .

      - name: Deploy to 4everland Hosting
        if: steps.gate.outputs.deploy == 'true'
        env:
          TOKEN: ${{ secrets.FOUR_EVERLAND_TOKEN }}
          PROJECT_ID: ${{ vars.FOUR_EVERLAND_PROJECT_ID }}
        run: |
          if [ -z "$TOKEN" ] || [ -z "$PROJECT_ID" ]; then
            echo "::warning::FOUR_EVERLAND_TOKEN / FOUR_EVERLAND_PROJECT_ID not set — built but did not deploy."
            exit 0
          fi
          curl -fsS --retry 3 \
            -H "token: $TOKEN" \
            -F "file=@web.zip" \
            -F "projectId=$PROJECT_ID" \
            https://cli-api.4everland.org/deploy
          echo "::notice::Web deployed — its IPNS now points to the new build."
