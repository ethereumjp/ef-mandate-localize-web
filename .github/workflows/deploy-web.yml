name: Deploy web to 4everland

# Builds the reading site (apps/web) in CI and deploys apps/web/dist to its OWN
# 4everland Hosting project. The widget is loaded from its own deploy via
# PUBLIC_ANNO_WIDGET_URL, so the site is managed independently (see deploy-widget.yml).
#
# NOTE: cli-api.4everland.org is the API the official @4everland/hosting-cli uses
# under the hood — stable in practice but not a published/contracted API.
#
# Config (Settings → Environments → "production", + Secrets and variables → Actions):
#   secret   FOUR_EVERLAND_TOKEN           Hosting → Auth Token → +Create
#   variable FOUR_EVERLAND_WEB_PROJECT_ID  id of the web Hosting project
#   variable PUBLIC_ANNO_WIDGET_URL       the widget bundle URL (…/embed.js) — REQUIRED
#                                          (deploy fails without it; the site loads the widget from it).
#                                          Use the jsDelivr URL backed by the widget-release branch
#                                          (see deploy-widget.yml) — NOT a public IPFS gateway URL;
#                                          ipfs.io/dweb.link hotlinking is being sunset in 2026.
#   variable FOUR_EVERLAND_WEB_DEPLOY_URL  (optional) live URL → skip-if-unchanged
#
# Create the project via the API (NOT GitHub integration, so 4everland does NOT build):
#   curl -H "token: $TOKEN" -F name=ef-mandate-localize-web -F platform=IPFS \
#        https://cli-api.4everland.org/project

on:
  workflow_dispatch: {}
  push:
    branches: [main]
    paths:
      - "apps/web/**"
      - "packages/core/**"
      - "localize" # submodule pointer bumps (content)
      - "pnpm-lock.yaml"
      - ".github/workflows/deploy-web.yml"

concurrency:
  group: deploy-web-4everland
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 15
    steps:
      - name: Check out repository (with submodules)
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Set up pnpm
        uses: pnpm/action-setup@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build site (widget loaded externally)
        env:
          PUBLIC_ANNO_WIDGET_URL: ${{ vars.PUBLIC_ANNO_WIDGET_URL }}
        run: pnpm --filter ef-mandate-localize-web build:site

      - name: Require PUBLIC_ANNO_WIDGET_URL
        if: vars.PUBLIC_ANNO_WIDGET_URL == ''
        run: |
          echo "::error::PUBLIC_ANNO_WIDGET_URL is not set — site would ship without the widget. Deploy blocked."
          exit 1

      - name: Build id + skip-if-unchanged
        id: gate
        env:
          DEPLOY_URL: ${{ vars.FOUR_EVERLAND_WEB_DEPLOY_URL }}
        run: |
          new=$(cd apps/web/dist && find . -type f -exec sha256sum {} \; | LC_ALL=C sort | sha256sum | cut -d' ' -f1)
          echo "web build id: $new"
          cur=""
          if [ -n "$DEPLOY_URL" ]; then
            cur=$(curl -fsS --max-time 20 "${DEPLOY_URL%/}/.build-id" 2>/dev/null || echo "")
          fi
          if [ -n "$cur" ] && [ "$new" = "$cur" ]; then
            echo "deploy=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Web build unchanged ($new) — skipping deploy."
          else
            echo "deploy=true" >> "$GITHUB_OUTPUT"
          fi
          echo "$new" > apps/web/dist/.build-id

      - name: Zip dist
        if: steps.gate.outputs.deploy == 'true'
        run: cd apps/web/dist && zip -qr "$GITHUB_WORKSPACE/web.zip" .

      - name: Deploy to 4everland Hosting
        if: steps.gate.outputs.deploy == 'true'
        env:
          TOKEN: ${{ secrets.FOUR_EVERLAND_TOKEN }}
          PROJECT_ID: ${{ vars.FOUR_EVERLAND_WEB_PROJECT_ID }}
        run: |
          if [ -z "$TOKEN" ] || [ -z "$PROJECT_ID" ]; then
            echo "::warning::FOUR_EVERLAND_TOKEN / FOUR_EVERLAND_WEB_PROJECT_ID not set — built but did not deploy."
            exit 0
          fi
          curl -fsS --retry 3 \
            -H "token: $TOKEN" \
            -F "file=@web.zip" \
            -F "projectId=$PROJECT_ID" \
            https://cli-api.4everland.org/deploy
          echo "::notice::Web deployed — its IPNS now points to the new build."
