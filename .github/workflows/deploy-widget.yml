name: Publish widget (jsDelivr)

# Builds @anno/widget in CI and publishes packages/widget/dist (embed.js + lazy
# chunks) to the `widget-release` branch — a single orphan commit holding only
# the built dist, force-pushed on every publish. jsDelivr serves it at
#   https://cdn.jsdelivr.net/gh/<owner>/<repo>@widget-release/packages/widget/dist/embed.js
# (branch refs are cached ~12h; the publish purges embed.js so updates land
# immediately — lazy chunks are content-hashed and need no purge).
#
# This is the embed URL for third-party sites: correct-MIME, CORS-enabled,
# multi-CDN, and immune to the 2026 public IPFS gateway sunset
# (ipfs.io/dweb.link → inbrowser.link redirects — SW gateways cannot serve
# cross-origin <script src>). The reading site does NOT use it: the widget is
# bundled into the site build, served same-origin (see deploy-web.yml).
#
# No secrets or variables needed — pushes with the workflow's GITHUB_TOKEN.
# No submodule needed — the widget is generic and does not use localize/ content.

on:
  workflow_dispatch: {}
  push:
    branches: [main]
    paths:
      - "packages/widget/**"
      - "packages/core/**"
      - "pnpm-lock.yaml"
      - ".github/workflows/deploy-widget.yml"

concurrency:
  group: publish-widget-jsdelivr
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write # force-push the widget-release dist branch
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up pnpm
        uses: pnpm/action-setup@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build widget
        run: pnpm run build:widget

      - name: Build id + skip-if-unchanged
        id: gate
        run: |
          new=$(cd packages/widget/dist && find . -type f -exec sha256sum {} \; | LC_ALL=C sort | sha256sum | cut -d' ' -f1)
          echo "widget build id: $new"
          cur=""
          if git fetch --depth 1 origin widget-release 2>/dev/null; then
            cur=$(git show FETCH_HEAD:packages/widget/dist/.build-id 2>/dev/null || echo "")
          fi
          if [ -n "$cur" ] && [ "$new" = "$cur" ]; then
            echo "publish=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Widget build unchanged ($new) — skipping publish."
          else
            echo "publish=true" >> "$GITHUB_OUTPUT"
          fi
          echo "$new" > packages/widget/dist/.build-id

      - name: Publish dist to widget-release branch (jsDelivr)
        if: steps.gate.outputs.publish == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tmp=$(mktemp -d)
          mkdir -p "$tmp/packages/widget"
          cp -r packages/widget/dist "$tmp/packages/widget/dist"
          cd "$tmp"
          git init -q -b widget-release
          git add -A
          git -c user.name="github-actions[bot]" \
              -c user.email="41898282+github-actions[bot]@users.noreply.github.com" \
              commit -qm "widget dist from ${GITHUB_SHA}"
          git push --force "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" widget-release
          # Branch refs are cached ~12h on jsDelivr; purge embed.js so the new
          # build is picked up now. Best-effort — a failed purge only delays it.
          curl -fsS --max-time 30 \
            "https://purge.jsdelivr.net/gh/${GITHUB_REPOSITORY}@widget-release/packages/widget/dist/embed.js" \
            || echo "::warning::jsDelivr purge failed — embed.js may take up to 12h to refresh."
          echo "::notice::Widget published — https://cdn.jsdelivr.net/gh/${GITHUB_REPOSITORY}@widget-release/packages/widget/dist/embed.js"
