name: site-checks

on:
  push:
    branches: [feat/commentary, main]
  pull_request:

jobs:
  blocks:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: commentary
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: commentary/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @commentary/site run lint
      - run: pnpm --filter @commentary/site run fmt:check
      - run: pnpm -r run typecheck
      - run: pnpm --filter @commentary/site run check:astro
      - run: pnpm -r test
      - run: pnpm --filter @commentary/site run blocks:check
      - run: pnpm --filter @commentary/site run anchors:build
      # The on-chain attest path (EAS attestation via a Sepolia wallet) is verified
      # manually — there is no wallet or Sepolia RPC in CI.  See commentary/docs/m4-demo-checklist.md.
      - run: pnpm --filter @commentary/site build
