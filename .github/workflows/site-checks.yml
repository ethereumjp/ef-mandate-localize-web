name: site-checks

on:
  push:
    branches: [feat/commentary, main]
  pull_request:

jobs:
  blocks:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: site
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: site/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm run lint
      - run: pnpm run fmt:check
      - run: pnpm run typecheck
      - run: pnpm run check:astro
      - run: pnpm test
      - run: pnpm run blocks:check
      - run: pnpm run anchors:build
      # The on-chain attest path (EAS attestation via a Sepolia wallet) is verified
      # manually — there is no wallet or Sepolia RPC in CI.  See site/docs/m4-demo-checklist.md.
      - run: pnpm build
